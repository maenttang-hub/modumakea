name: Validation Baseline

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 18 * * 0'

jobs:
  baseline:
    name: Baseline Reliability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run baseline validation gate
        run: npm run test:validation:baseline

  extended:
    name: Extended Validation Nightly
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run extended validation suite
        run: npm run test:validation:extended
